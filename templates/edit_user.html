{% extends "base.html" %}

{% block content %}

<div class="admin-container">

    <h1 class="admin-title">Edit User</h1>

    <form method="POST" class="admin-form">

        <div class="form-group">
            <label>Username</label>
            <input type="text"
                   name="username"
                   value="{{ user.username }}"
                   required>
        </div>

        <div class="form-group">
            <label>Role</label>
            <select name="role">
                <option value="manager"
                    {% if user.role == "manager" %}
                        selected
                    {% endif %}>
                    Manager
                </option>

                <option value="assistant_manager"
                    {% if user.role == "assistant_manager" %}
                        selected
                    {% endif %}>
                    Assistant Manager
                </option>

                <option value="warehouse"
                    {% if user.role == "warehouse" %}
                        selected
                    {% endif %}>
                    Warehouse
                </option>

                <option value="admin"
                    {% if user.role == "admin" %}
                        selected
                    {% endif %}>
                    Admin
                </option>

            </select>

        </div>

        <div class="form-group">
            <label>Store</label>
            <select name="store_id">

                {% for store in stores %}
                <option value="{{ store.store_id }}"
                    {% if store.store_id == user.store_id %}
                        selected
                    {% endif %}>

                    {{ store.store_name }}
                </option>

                {% endfor %}

            </select>

        </div>

        <div class="admin-form-buttons">

            <button type="submit" class="admin-btn">
                Save Changes
            </button>

            <a href="{{ url_for('manage_users') }}"
               class="admin-btn back-btn">

                Back to Users

            </a>
        </div>
    </form>
</div>

{% endblock %}
